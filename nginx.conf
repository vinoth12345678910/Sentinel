# Sentinel Nginx Configuration
# Copy this file to /etc/nginx/sites-available/sentinel and symlink it:
#   sudo cp nginx.conf /etc/nginx/sites-available/sentinel
#   sudo ln -s /etc/nginx/sites-available/sentinel /etc/nginx/sites-enabled/sentinel

server {
    listen 80;
    server_name _;

    client_max_body_size 5M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}

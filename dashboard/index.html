<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel - Dashboard</title>
  <link rel="stylesheet" href="/dashboard/css/design-system.css">
  <style>
    #app { min-height: 100vh; }
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: var(--space-4);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
    }
    .login-card h1 {
      text-align: center;
      margin-bottom: var(--space-2);
      font-size: var(--text-2xl);
    }
    .login-card p {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
      font-size: var(--text-sm);
    }
    .login-logo {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .login-logo svg { width: 40px; height: 40px; display: inline-block; color: var(--accent); }
    .login-error {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      color: var(--red);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
      display: none;
    }
    .login-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-muted);
    }
    .login-footer a { color: var(--accent); cursor: pointer; }
    .login-tabs {
      display: flex;
      margin-bottom: var(--space-6);
      border-bottom: 1px solid var(--border);
    }
    .login-tab {
      flex: 1;
      text-align: center;
      padding: var(--space-3);
      cursor: pointer;
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      border-bottom: 2px solid transparent;
      transition: all var(--transition-fast);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }
    .login-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .login-form { display: none; }
    .login-form.active { display: block; }
    .sidebar-toggle-mobile { display: none; }
    @media (max-width: 768px) {
      .sidebar-toggle-mobile { display: flex; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="/dashboard/js/lib/framework.js"></script>
  <script src="/dashboard/js/lib/api.js"></script>
  <script src="/dashboard/js/lib/components.js"></script>

  <script src="/dashboard/js/pages/home.js"></script>
  <script src="/dashboard/js/pages/projects.js"></script>
  <script src="/dashboard/js/pages/project-detail.js"></script>
  <script src="/dashboard/js/pages/apps.js"></script>
  <script src="/dashboard/js/pages/app-detail.js"></script>
  <script src="/dashboard/js/pages/deployment-detail.js"></script>
  <script src="/dashboard/js/pages/create.js"></script>
  <script src="/dashboard/js/pages/settings.js"></script>
  <script src="/dashboard/js/pages/teams.js"></script>
  <script src="/dashboard/js/pages/monitoring.js"></script>
  <script src="/dashboard/js/pages/activity.js"></script>

  <script>
    (function () {
      'use strict';

      var routes = {
        '/': { component: 'HomePage', title: 'Dashboard' },
        '/projects': { component: 'ProjectsPage', title: 'Projects' },
        '/projects/:id': { component: 'ProjectDetailPage', title: 'Project' },
        '/apps': { component: 'AppsPage', title: 'Apps' },
        '/apps/:name': { component: 'AppDetailPage', title: 'App' },
        '/apps/:name/deployments/:id': { component: 'DeploymentDetailPage', title: 'Deployment' },
        '/create': { component: 'CreateProjectPage', title: 'Create App' },
        '/settings': { component: 'SettingsPage', title: 'Settings' },
        '/teams': { component: 'TeamsPage', title: 'Teams' },
        '/monitoring': { component: 'MonitoringPage', title: 'Monitoring' },
        '/activity': { component: 'ActivityPage', title: 'Activity' },
      };

      function storeToken(token) {
        try { localStorage.setItem('sentinel_token', token); } catch (e) {}
        SentinelStore.setState('token', token);
        SentinelAPI.setToken(token);
      }

      function storeUser(user) {
        try { localStorage.setItem('sentinel_user', JSON.stringify(user)); } catch (e) {}
        SentinelStore.setState('user', user);
      }

      function clearAuth() {
        try { localStorage.removeItem('sentinel_token'); localStorage.removeItem('sentinel_user'); } catch (e) {}
        SentinelStore.setState('token', null);
        SentinelStore.setState('user', null);
        SentinelAPI.clearToken();
      }

      function getStoredToken() {
        try { return localStorage.getItem('sentinel_token'); } catch (e) { return null; }
      }

      function getStoredUser() {
        try {
          var raw = localStorage.getItem('sentinel_user');
          return raw ? JSON.parse(raw) : null;
        } catch (e) { return null; }
      }

      function showLoginPage() {
        var rocketIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>';

        var html =
          '<div class="login-page">' +
            '<div class="login-card">' +
              '<div class="login-logo">' + rocketIcon + '</div>' +
              '<h1>Sentinel</h1>' +
              '<p>Sign in to your deployment dashboard</p>' +
              '<div id="login-error" class="login-error"></div>' +
              '<div class="login-tabs">' +
                '<button class="login-tab active" data-tab="login">Sign In</button>' +
                '<button class="login-tab" data-tab="register">Create Account</button>' +
              '</div>' +
              '<div id="login-form" class="login-form active">' +
                '<div class="form-group">' +
                  '<label class="form-label" for="login-username">Username</label>' +
                  '<input type="text" id="login-username" class="form-input" placeholder="Enter your username" autocomplete="username" />' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label" for="login-password">Password</label>' +
                  '<input type="password" id="login-password" class="form-input" placeholder="Enter your password" autocomplete="current-password" />' +
                '</div>' +
                '<button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;padding:var(--space-3)">Sign In</button>' +
              '</div>' +
              '<div id="register-form" class="login-form">' +
                '<div class="form-group">' +
                  '<label class="form-label" for="reg-username">Username</label>' +
                  '<input type="text" id="reg-username" class="form-input" placeholder="Choose a username" autocomplete="off" />' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label" for="reg-email">Email</label>' +
                  '<input type="email" id="reg-email" class="form-input" placeholder="Enter your email" autocomplete="email" />' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label" for="reg-password">Password</label>' +
                  '<input type="password" id="reg-password" class="form-input" placeholder="Create a password" autocomplete="new-password" />' +
                '</div>' +
                '<div class="form-group">' +
                  '<label class="form-label" for="reg-confirm">Confirm Password</label>' +
                  '<input type="password" id="reg-confirm" class="form-input" placeholder="Confirm your password" autocomplete="new-password" />' +
                '</div>' +
                '<button id="register-btn" class="btn btn-primary" style="width:100%;justify-content:center;padding:var(--space-3)">Create Account</button>' +
              '</div>' +
              '<div class="login-footer">' +
                '<a href="/">Back to home</a>' +
              '</div>' +
            '</div>' +
          '</div>';

        document.getElementById('app').innerHTML = html;

        var loginTab = document.querySelector('.login-tab[data-tab="login"]');
        var registerTab = document.querySelector('.login-tab[data-tab="register"]');
        var loginForm = document.getElementById('login-form');
        var registerForm = document.getElementById('register-form');

        loginTab.addEventListener('click', function () {
          loginTab.classList.add('active');
          registerTab.classList.remove('active');
          loginForm.classList.add('active');
          registerForm.classList.remove('active');
          document.getElementById('login-error').style.display = 'none';
        });

        registerTab.addEventListener('click', function () {
          registerTab.classList.add('active');
          loginTab.classList.remove('active');
          registerForm.classList.add('active');
          loginForm.classList.remove('active');
          document.getElementById('login-error').style.display = 'none';
        });

        document.getElementById('login-btn').addEventListener('click', function (e) {
          e.preventDefault();
          var username = document.getElementById('login-username').value.trim();
          var password = document.getElementById('login-password').value;
          if (!username || !password) {
            showLoginError('Please fill in all fields.');
            return;
          }
          SentinelAPI.login(username, password)
            .then(function (data) {
              if (data && data.accessToken) {
                storeToken(data.accessToken);
                storeUser(data.user || { username: username, name: username });
                initApp();
              } else {
                showLoginError('Invalid response from server.');
              }
            })
            .catch(function (err) {
              showLoginError(err.message || 'Login failed. Please try again.');
            });
        });

        document.getElementById('register-btn').addEventListener('click', function (e) {
          e.preventDefault();
          var username = document.getElementById('reg-username').value.trim();
          var email = document.getElementById('reg-email').value.trim();
          var password = document.getElementById('reg-password').value;
          var confirm = document.getElementById('reg-confirm').value;
          if (!username || !email || !password || !confirm) {
            showLoginError('Please fill in all fields.');
            return;
          }
          if (password !== confirm) {
            showLoginError('Passwords do not match.');
            return;
          }
          if (password.length < 6) {
            showLoginError('Password must be at least 6 characters.');
            return;
          }
          SentinelAPI.register(username, email, password)
            .then(function (data) {
              if (data && data.accessToken) {
                storeToken(data.accessToken);
                storeUser(data.user || { username: username, name: username, email: email });
                initApp();
              } else {
                showLoginError('Invalid response from server.');
              }
            })
            .catch(function (err) {
              showLoginError(err.message || 'Registration failed. Please try again.');
            });
        });

        function showLoginError(msg) {
          var el = document.getElementById('login-error');
          if (el) {
            el.textContent = msg;
            el.style.display = 'block';
          }
        }
      }

      function initApp() {
        var user = SentinelStore.getState('user') || getStoredUser() || {};
        var token = SentinelStore.getState('token') || getStoredToken();

        if (token) {
          storeToken(token);
        }
        if (user) {
          storeUser(user);
        }

        var sidebarSections = [
          {
            title: 'Overview',
            items: [
              { icon: 'home', label: 'Dashboard', href: '/' },
              { icon: 'activity', label: 'Activity', href: '/activity' },
            ]
          },
          {
            title: 'Management',
            items: [
              { icon: 'folder', label: 'Projects', href: '/projects' },
              { icon: 'app', label: 'Apps', href: '/apps' },
              { icon: 'monitor', label: 'Monitoring', href: '/monitoring' },
            ]
          },
          {
            title: 'Settings',
            items: [
              { icon: 'settings', label: 'Settings', href: '/settings' },
              { icon: 'users', label: 'Teams', href: '/teams' },
            ]
          }
        ];

        var currentPath = window.location.hash ? window.location.hash.slice(1) : '/';
        sidebarSections._user = user;

        var sidebarHtml = SentinelUI.sidebar(sidebarSections, currentPath);

        var navbarHtml = SentinelUI.navbar('Dashboard', user);

        var appHtml =
          '<div class="app-layout">' +
            '<div class="sidebar-overlay" onclick="document.querySelector(\'.sidebar\').classList.remove(\'open\');this.classList.remove(\'open\')"></div>' +
            '<aside class="sidebar">' + sidebarHtml + '</aside>' +
            '<div class="main-content">' +
              navbarHtml +
              '<div class="page-content">' +
                '<div id="page-content"></div>' +
              '</div>' +
            '</div>' +
          '</div>';

        document.getElementById('app').innerHTML = appHtml;

        var appLevelRoutes = {};
        for (var pattern in routes) {
          if (routes.hasOwnProperty(pattern)) {
            var compName = routes[pattern].component;
            if (window.SentinelPages && window.SentinelPages[compName]) {
              appLevelRoutes[pattern] = window.SentinelPages[compName];
            }
          }
        }

        SentinelRouter.init(appLevelRoutes, 'page-content');

        window.addEventListener('hashchange', function () {
          var path = window.location.hash ? window.location.hash.slice(1) : '/';
          var sidebarNav = document.querySelector('.sidebar-nav');
          if (sidebarNav) {
            var newSidebar = SentinelUI.sidebar(sidebarSections, path);
            var sidebar = document.querySelector('.sidebar');
            if (sidebar) {
              var existingNav = sidebar.querySelector('.sidebar-nav');
              var existingFooter = sidebar.querySelector('.sidebar-footer');
              if (existingNav) {
                var tempDiv = document.createElement('div');
                tempDiv.innerHTML = newSidebar;
                var newNav = tempDiv.querySelector('.sidebar-nav');
                var newFooter = tempDiv.querySelector('.sidebar-footer');
                if (newNav) existingNav.innerHTML = newNav.innerHTML;
                if (newFooter && existingFooter) existingFooter.innerHTML = newFooter.innerHTML;
              }
            }
          }
        });

        var navbarTitleEl = document.querySelector('.navbar-left h4');
        var currentRoute = SentinelRouter.getCurrentRoute();
        if (currentRoute && routes[currentRoute.pattern]) {
          var routeTitle = routes[currentRoute.pattern].title;
          if (navbarTitleEl && routeTitle) {
            navbarTitleEl.textContent = routeTitle;
          }
        }
      }

      function showApp() {
        var token = getStoredToken();
        var user = getStoredUser();

        if (token && user) {
          storeToken(token);
          storeUser(user);
          initApp();
          return;
        }

        if (token) {
          storeToken(token);
          SentinelAPI.getMe()
            .then(function (data) {
              if (data) {
                storeUser(data);
                initApp();
              } else {
                return SentinelAPI.refreshToken();
              }
            })
            .then(function (refreshed) {
              if (refreshed === true) {
                return SentinelAPI.getMe();
              }
              return null;
            })
            .then(function (meData) {
              if (meData) {
                storeUser(meData);
                initApp();
              } else {
                clearAuth();
                showLoginPage();
              }
            })
            .catch(function () {
              clearAuth();
              showLoginPage();
            });
          return;
        }

        SentinelAPI.refreshToken()
          .then(function (refreshed) {
            if (refreshed) {
              var newToken = SentinelAPI.token;
              storeToken(newToken);
              return SentinelAPI.getMe();
            }
            return null;
          })
          .then(function (meData) {
            if (meData) {
              storeUser(meData);
              initApp();
            } else {
              clearAuth();
              showLoginPage();
            }
          })
          .catch(function () {
            clearAuth();
            showLoginPage();
          });
      }

      document.addEventListener('DOMContentLoaded', showApp);
    })();
  </script>
</body>
</html>
